<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TubeTalk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            --border-subtle: #27272a;
            --border-focus: #52525b;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --brand-primary: #ffffff;
            --brand-primary-invert: #000000;
            --error-text: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition-snappy: 0.2s cubic-bezier(0.2, 0, 0, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-focus);
        }

        /* Layout Views */
        #app-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .view-section {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .view-section.active {
            opacity: 1;
            pointer-events: all;
            z-index: 10;
        }

        /* --- Setup View --- */
        #setup-view {
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .setup-container {
            width: 100%;
            max-width: 440px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.6s var(--transition-smooth) forwards;
        }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        .setup-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .setup-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .setup-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .base-input {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            padding: 0.875rem 1rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color var(--transition-snappy);
        }

        .base-input:focus {
            border-color: var(--border-focus);
        }

        .base-input::placeholder {
            color: #52525b;
        }

        .primary-btn {
            width: 100%;
            background: var(--brand-primary);
            color: var(--brand-primary-invert);
            border: none;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: background-color var(--transition-snappy), transform var(--transition-snappy);
            margin-top: 2rem;
        }

        .primary-btn:hover:not(:disabled) {
            background: #e4e4e7;
        }

        .primary-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .primary-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* --- Chat View --- */
        #chat-view {
            max-width: 800px;
            margin: 0 auto;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 20;
        }

        .chat-header-title {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .chat-header-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            width: 100%;
            animation: messageAppear 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes messageAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.ai {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 0.875rem 1.25rem;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message-wrapper.user .message-bubble {
            background: var(--bg-surface-hover);
            color: var(--text-main);
            border-radius: 20px 20px 4px 20px;
        }

        .message-wrapper.ai .message-bubble {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-subtle);
            border-radius: 20px 20px 20px 4px;
        }

        .message-wrapper.error .message-bubble {
            background: var(--error-bg);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error-text);
            border-radius: var(--radius-md);
        }

        /* --- Chat Input Area --- */
        .chat-input-container {
            padding: 1rem 1.5rem 1.5rem;
            background: linear-gradient(to top, var(--bg-base) 80%, transparent);
            z-index: 20;
        }

        .chat-input-box {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 0.5rem 0.5rem 0.5rem 1rem;
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            transition: border-color var(--transition-snappy);
        }

        .chat-input-box:focus-within {
            border-color: var(--border-focus);
        }

        .chat-input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            max-height: 200px;
            min-height: 24px;
            padding: 0.5rem 0;
            outline: none;
            line-height: 1.5;
        }

        .chat-input-box textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--brand-primary);
            color: var(--brand-primary-invert);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform var(--transition-snappy), opacity var(--transition-snappy);
            flex-shrink: 0;
            margin-bottom: 4px;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: var(--text-muted);
        }

        /* --- UI States & Animations --- */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 0.5rem 0;
            align-items: center;
        }

        .typing-dot {
            width: 5px;
            height: 5px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .error-toast {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--error-bg);
            color: var(--error-text);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 0.85rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
        }

        .error-toast.show {
            opacity: 1;
        }

        @media (max-width: 640px) {
            #setup-view { padding: 1rem; }
            .setup-container { padding: 2rem 1.5rem; border-radius: var(--radius-md); }
            .chat-messages { padding: 1rem; }
            .message-bubble { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div id="error-toast" class="error-toast"></div>

    <div id="app-container">
        
        <div id="setup-view" class="view-section active">
            <div class="setup-container">
                <div class="setup-header">
                    <h1>TubeTalk</h1>
                    <p>Enter details to start chatting with the video.</p>
                </div>
                
                <div class="input-group">
                    <label for="youtube-url">YouTube URL</label>
                    <input type="text" id="youtube-url" class="base-input" placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
                </div>

                <div class="input-group">
                    <label for="api-key">OpenRouter API Key</label>
                    <input type="password" id="api-key" class="base-input" placeholder="sk-or-v1-..." autocomplete="off">
                </div>

                <button id="start-btn" class="primary-btn">
                    Analyze Video
                </button>
            </div>
        </div>

        <div id="chat-view" class="view-section">
            <header class="chat-header">
                <div class="chat-header-title">TubeTalk Session</div>
                <div class="chat-header-status">
                    <div class="status-dot"></div> Connected
                </div>
            </header>

            <div id="chat-messages" class="chat-messages">
                </div>

            <div class="chat-input-container">
                <div class="chat-input-box">
                    <textarea id="chat-input" rows="1" placeholder="Ask a question about the video..."></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
    const API_BASE_URL =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
            ? "http://127.0.0.1:8000"
            : "https://your-backend-name.onrender.com";

    const setupView = document.getElementById('setup-view');
    const chatView = document.getElementById('chat-view');

    const urlInput = document.getElementById('youtube-url');
    const apiKeyInput = document.getElementById('api-key');

    const startBtn = document.getElementById('start-btn');

    const chatMessages = document.getElementById('chat-messages');

    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    const errorToast = document.getElementById('error-toast');

    let currentUrl = '';
    let currentApiKey = '';

    let isProcessing = false;

    const showError = (message) => {
        errorToast.textContent = message;

        errorToast.classList.add('show');

        setTimeout(() => {
            errorToast.classList.remove('show');
        }, 4000);
    };

    const scrollToBottom = () => {
        requestAnimationFrame(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    };

    const updateSendButton = () => {
        sendBtn.disabled =
            chatInput.value.trim() === '' || isProcessing;
    };

    chatInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = `${this.scrollHeight}px`;

        updateSendButton();
    });

    const appendMessage = (role, text) => {
        const wrapper = document.createElement('div');

        wrapper.className = `message-wrapper ${role}`;

        const bubble = document.createElement('div');

        bubble.className = 'message-bubble';

        bubble.textContent = text;

        wrapper.appendChild(bubble);

        chatMessages.appendChild(wrapper);

        scrollToBottom();

        return wrapper;
    };

    const showTypingIndicator = () => {
        const wrapper = document.createElement('div');

        wrapper.className = 'message-wrapper ai';

        wrapper.id = 'typing-indicator';

        const bubble = document.createElement('div');

        bubble.className = 'message-bubble';

        bubble.innerHTML = `
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;

        wrapper.appendChild(bubble);

        chatMessages.appendChild(wrapper);

        scrollToBottom();
    };

    const removeTypingIndicator = () => {
        const indicator =
            document.getElementById('typing-indicator');

        if (indicator) {
            indicator.remove();
        }
    };

    const setLoadingState = (loading) => {
        isProcessing = loading;

        updateSendButton();

        startBtn.disabled = loading;

        if (loading) {
            startBtn.innerHTML = `
                <div class="spinner"></div>
                Analyzing video...
            `;
        } else {
            startBtn.innerHTML = 'Analyze Video';
        }
    };

    const validateInputs = () => {
        currentUrl = urlInput.value.trim();
        currentApiKey = apiKeyInput.value.trim();

        if (!currentUrl || !currentApiKey) {
            showError(
                'Please enter both YouTube URL and API Key.'
            );

            return false;
        }

        return true;
    };

    startBtn.addEventListener('click', async () => {
        if (isProcessing) return;

        if (!validateInputs()) return;

        setLoadingState(true);

        try {
            const response = await fetch(
                `${API_BASE_URL}/health`
            );

            if (!response.ok) {
                throw new Error();
            }

            setupView.classList.remove('active');

            setTimeout(() => {
                chatView.classList.add('active');

                appendMessage(
                    'ai',
                    "I've analyzed the video content. What would you like to know?"
                );

                chatInput.focus();
            }, 400);

        } catch {
            showError(
                'Unable to connect to backend server.'
            );
        } finally {
            setLoadingState(false);
        }
    });

    const handleSend = async () => {
        if (isProcessing) return;

        const question = chatInput.value.trim();

        if (!question) return;

        chatInput.value = '';

        chatInput.style.height = 'auto';

        updateSendButton();

        appendMessage('user', question);

        showTypingIndicator();

        isProcessing = true;

        updateSendButton();

        try {
            const controller = new AbortController();

            const timeout = setTimeout(() => {
                controller.abort();
            }, 60000);

            const response = await fetch(
                `${API_BASE_URL}/chat`,
                {
                    method: 'POST',

                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({
                        youtube_url: currentUrl,
                        api_key: currentApiKey,
                        question: question
                    }),

                    signal: controller.signal
                }
            );

            clearTimeout(timeout);

            removeTypingIndicator();

            const data = await response.json();

            if (!response.ok) {
                throw new Error(
                    data.error ||
                    data.detail ||
                    'Request failed'
                );
            }

            if (data.error) {
                throw new Error(data.error);
            }

            appendMessage(
                'ai',
                data.answer || 'No response received.'
            );

        } catch (error) {

            removeTypingIndicator();

            if (error.name === 'AbortError') {

                appendMessage(
                    'error',
                    'Request timed out.'
                );

            } else {

                appendMessage(
                    'error',
                    error.message ||
                    'Something went wrong.'
                );
            }

        } finally {

            isProcessing = false;

            updateSendButton();

            chatInput.focus();
        }
    };

    sendBtn.addEventListener('click', handleSend);

    chatInput.addEventListener('keydown', (e) => {

        if (
            e.key === 'Enter' &&
            !e.shiftKey
        ) {

            e.preventDefault();

            handleSend();
        }
    });

    window.addEventListener('resize', scrollToBottom);
</script>
</body>
</html>
